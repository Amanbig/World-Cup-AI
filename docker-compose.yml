services:

  # ── One-shot ingest — runs once, populates chroma_db, then exits ─────────────
  ingest:
    build:
      context: .
      dockerfile: Dockerfile
    command: python ingest.py --pdf "/data/Laws of the Game 2024_25.pdf"
    env_file:
      - .env
    volumes:
      - chroma_data:/app/chroma_db
      - ./server:/data:ro          # PDF lives in server/ on host
    restart: "no"


  # ── MatchMind app (FastAPI + built React frontend) ────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - LANGFLOW_URL=http://langflow:7860   # sibling service in Docker network
      - CORS_ORIGINS=http://localhost:5173,http://localhost:8000
    volumes:
      - chroma_data:/app/chroma_db
    depends_on:
      langflow:
        condition: service_healthy
    restart: unless-stopped


  # ── Langflow visual RAG pipeline editor ──────────────────────────────────────
  langflow:
    image: langflowai/langflow:latest
    ports:
      - "7860:7860"
    environment:
      - LANGFLOW_AUTO_LOGIN=true
      - LANGFLOW_NO_AUTH=true
      - LANGFLOW_DATABASE_URL=sqlite:////data/langflow.db
      - LANGFLOW_CONFIG_DIR=/data
      - LANGFLOW_LOAD_FLOWS_PATH=/flows    # auto-import flows on startup
    volumes:
      - ./langflow_data:/data
      - chroma_data:/chroma_db
      - ./langflow:/flows                  # langflow/*.json imported automatically
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 30s
    restart: unless-stopped


volumes:
  chroma_data:
